# =============================================================================
# Docker Compose - PRODUCCIÓN VPS
# Levanta: Backend + PostgreSQL
# =============================================================================

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: radio-cesar-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-radio_cesar}
    ports:
      - '${DB_PORT:-5434}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - radio-cesar-prod-network

  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: radio-cesar-backend-prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.docker
    environment:
      # Application
      NODE_ENV: production
      PORT: 3000
      
      # Database
      DATABASE_URL: postgresql://${DB_USERNAME:-postgres}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-radio_cesar}?schema=public
      
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      
      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN}
      
      # AzuraCast API
      AZURACAST_BASE_URL: ${AZURACAST_BASE_URL}
      AZURACAST_STATION_ID: ${AZURACAST_STATION_ID}
      AZURACAST_API_KEY: ${AZURACAST_API_KEY}
      
      # File uploads
      UPLOAD_DIR: ${UPLOAD_DIR:-./uploads}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
    ports:
      - '${BACKEND_PORT:-3005}:3000'
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - radio-cesar-prod-network

volumes:
  postgres_data:

networks:
  radio-cesar-prod-network:
    driver: bridge
