# =============================================================================
# Docker Compose - DESARROLLO LOCAL
# Levanta: Backend + PostgreSQL
# Frontend se corre con pnpm dev (fuera de Docker)
# =============================================================================

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: radio-cesar-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-radio_comunitaria}
    ports:
      - '${DB_PORT:-5434}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - radio-cesar-dev-network

  # Backend API Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: radio-cesar-backend-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Application
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      
      # Database
      DATABASE_URL: postgresql://${DB_USERNAME:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-radio_comunitaria}?schema=public
      
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      
      # CORS (múltiples orígenes para desarrollo)
      CORS_ORIGIN: http://localhost:5173,http://localhost:3006,http://localhost:8080
      
      # AzuraCast API
      AZURACAST_BASE_URL: ${AZURACAST_BASE_URL:-https://radio-azura.orioncaribe.com}
      AZURACAST_STATION_ID: ${AZURACAST_STATION_ID:-2}
      AZURACAST_API_KEY: ${AZURACAST_API_KEY}
      
      # File uploads
      UPLOAD_DIR: ${UPLOAD_DIR:-./uploads}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
    ports:
      - '${BACKEND_PORT:-3005}:3000'
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./backups:/app/backups
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - radio-cesar-dev-network

volumes:
  postgres_data:

networks:
  radio-cesar-dev-network:
    driver: bridge
