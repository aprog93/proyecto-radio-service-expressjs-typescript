version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: radio-comunitaria-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pFXo+853uWnC+N+kHlT5rXSGMuJtCBQI
      POSTGRES_DB: radio_comunitaria
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - radio-comunitaria-dev-network
    restart: unless-stopped

  # Backend API Service (development)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: radio-comunitaria-backend:latest
    container_name: radio-comunitaria-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Server
      PORT: 3000
      NODE_ENV: development
      
      # Database
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/radio_comunitaria
      
      # JWT
      JWT_SECRET: pNpklO51I1+01WHLvv5nzpmKi7fHgi7DI8nH1uDRBwk=
      
      # CORS
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3006}
      
      # AzuraCast API
      AZURACAST_BASE_URL: https://radio-azura.orioncaribe.com
      AZURACAST_STATION_ID: 2
      AZURACAST_API_KEY: ${AZURACAST_API_KEY:-c2eaef02043a3cf4:ef42d27717d4fd594a778351ac6c9e35}
      
      # File uploads
      UPLOAD_DIR: ./uploads
      MAX_FILE_SIZE: 10485760
    ports:
      - "${BACKEND_PORT:-3005}:3000"
    volumes:
      - ./uploads:/app/uploads
      - ./src:/app/src
      - ./prisma:/app/prisma
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - radio-comunitaria-dev-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  radio-comunitaria-dev-network:
    driver: bridge
